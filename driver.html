<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Registration - Hantz VIP Rides</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0A1128] text-white min-h-screen p-6">
    <div class="max-w-md mx-auto">
        <a href="index.html" class="text-[#D4AF37] mb-4 inline-block">← Back to Home</a>
        <h1 class="text-2xl font-bold text-[#D4AF37] mb-6">Driver Registration</h1>
        
        <form class="space-y-4">
            <input type="text" placeholder="Full Name" class="w-full p-3 rounded bg-gray-800 text-white">
            <input type="tel" placeholder="Phone Number" class="w-full p-3 rounded bg-gray-800 text-white">
            <input type="text" placeholder="Driver's License No" class="w-full p-3 rounded bg-gray-800 text-white">
            <input type="text" placeholder="Car Model & Year" class="w-full p-3 rounded bg-gray-800 text-white">
            
            <button type="button" onclick="window.location.href='https://wa.me/2348085526104?text=I want to register as a driver'" 
            class="w-full bg-green-500 p-3 rounded font-bold">
                Submit via WhatsApp
            </button>
        </form>
    </div>
</body>
</html>
