<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVR Driver Registration</title>
<base href="/movesmarthantzviprides-cyber/"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}body{background:#000;color:#fff;padding:20px}
.logo{width:50px;height:50px;background:#fbbf24;color:#000;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:32px;margin-bottom:20px}
.card{background:#111;border:1px solid #fbbf24;padding:25px;border-radius:15px;max-width:600px;margin:0 auto}
input{width:100%;padding:12px;margin:10px 0;background:#222;border:1px solid #333;border-radius:8px;color:#fff}
.btn{background:#fbbf24;color:#000;padding:14px;border:none;border-radius:10px;font-weight:bold;width:100%;cursor:pointer}
.warning{background:#7c2d12;border:1px solid #fbbf24;padding:15px;border-radius:10px;margin:15px 0;font-size:14px}
.gold{color:#fbbf24}
</style>
</head>
<body>
<div class="card">
<div class="logo">H</div>
<h1 class="gold">HVR DRIVER REGISTRATION</h1>

<div class="warning">
<b>⚠️ IMPORTANT:</b><br>
After submitting online, you MUST come with:<br>
1. Hardcopies of Driver's License, ID Card<br>
2. Your Vehicle for Physical Inspection<br>
3. Verification & Registration at HVR Office
</div>

<form onsubmit="sendDriverWhatsApp(event)">
<input id="dname" placeholder="Full Name" required>
<input id="dphone" placeholder="Phone Number" required>
<input id="dlicense" placeholder="Driver's License Number">
<input id="dvehicle" placeholder="Vehicle Type e.g Camry, Hiace">
<button class="btn">Send to HVR WhatsApp</button>
</form>
<a href="index.html" style="color:#fbbf24;display:block;text-align:center;margin-top:15px">← Back to Home</a>
</div>

<script>
function sendDriverWhatsApp(e){
e.preventDefault();
let name = document.getElementById('dname').value;
let phone = document.getElementById('dphone').value;
let license = document.getElementById('dlicense').value;
let vehicle = document.getElementById('dvehicle').value;
let msg = `NEW DRIVER REGISTRATION%0A%0AName: ${name}%0APhone: ${phone}%0ALicense: ${license}%0AVehicle: ${vehicle}%0A%0ANOTE: I will come with hardcopies and vehicle for inspection`;
window.open(`https://wa.me/2348085526104?text=${msg}`, '_blank');
}
</script>
</body>
</html>
